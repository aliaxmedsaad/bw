<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>For Aisha</title>
  <!-- inline guard against any white flash before style.css loads -->
  <style>html,body{background:#000;}</style>
  <!-- X.png is the only photo asset in use. T.jpg and TT.jpg are not used
       because they do not visually integrate with the dark finale. -->
  <link rel="preload" as="image" href="./X.png" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

<main class="site">

  <!-- ============ SCENE 1 · pink sunset mountains + lake ============ -->
  <section class="scene scene-sunset" id="sunset"
           aria-label="A pink sunset over hazy mountains, green banks and a calm lake">
    <div class="sunset-sticky" id="sunsetSticky">
      <div class="sky" aria-hidden="true"></div>
      <div class="sun-glow" aria-hidden="true"><div class="sun-core"></div></div>

      <!-- everything inside .zoom-group scales up as you scroll (the lake zoom).
           The opening visual is now a video; the gradient sky behind it acts
           as a fallback while the video loads. -->
      <div class="zoom-group" aria-hidden="true">
        <video
          class="scene-video"
          src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260328_083109_283f3553-e28f-428b-a723-d639c617eb2b.mp4"
          autoplay
          muted
          loop
          playsinline
          preload="auto"
        ></video>
      </div>

      <div class="sunset-particles" id="sunsetParticles" aria-hidden="true"></div>

      <!-- darkens with scroll progress and hands over to scene 2 -->
      <div class="dark-veil" aria-hidden="true"></div>

      <div class="cue-wrap">
        <a class="scroll-cue" href="#lanterns" aria-label="Scroll down to the next part">
          <span class="scroll-cue-text">scroll gently</span>
          <span class="scroll-cue-chevron" aria-hidden="true"></span>
        </a>
      </div>
    </div>
  </section>

  <!-- ============ SCENE 2 · dark lake, boat, message, lanterns ============ -->
  <section class="scene scene-lanterns" id="lanterns"
           aria-label="Two silhouettes in a small boat on dark water, surrounded by floating lanterns">
    <img
      class="boat-art"
      src="./X.png"
      alt="Two people in a small boat on dark water, reaching toward a glowing lantern beneath a sky filled with floating lanterns"
      decoding="async"
    />
    <div class="lantern-vignette" aria-hidden="true"></div>

    <!-- glowing lanterns drift in from off-screen (generated by script.js) -->
    <div class="lantern-field" id="lanternField" aria-hidden="true"></div>

    <p class="lantern-message" id="lanternMessage">You make every day special</p>
  </section>

  <!-- ============ SCENE 3 · tulips, starburst fireworks, finale ============ -->
  <section class="scene scene-finale" id="finale"
           aria-label="Two tulips bloom under gentle fireworks with a birthday message">
    <div class="finale-stars" id="finaleStars" aria-hidden="true"></div>
    <div class="spotlight" aria-hidden="true"></div>

    <canvas class="fireworks" id="fireworks" aria-hidden="true"></canvas>
    <div class="petal-layer" id="petalLayer" aria-hidden="true"></div>

    <h1 class="final-message" id="finalMessage" aria-label="To my second tulip- Happy Birthday, Aisha">
      <!-- script.js splits each line into word spans for the reveal -->
      <span class="message-line" data-line="To my second tulip-"></span>
      <span class="message-line message-line--big" data-line="Happy Birthday, Aisha"></span>
    </h1>

    <div class="tulips-wrap">
      <svg class="tulips" viewBox="0 0 320 340" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
        <defs>
          <linearGradient id="stemGrad" x1="0" y1="330" x2="0" y2="150" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#2c7a4c" />
            <stop offset="1" stop-color="#4fba75" />
          </linearGradient>
          <linearGradient id="leafGrad" x1="0" y1="1" x2="1" y2="0">
            <stop offset="0" stop-color="#256b42" />
            <stop offset="1" stop-color="#4fba75" />
          </linearGradient>
          <linearGradient id="petalSide" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0" stop-color="#d63d84" />
            <stop offset="1" stop-color="#ff8fbd" />
          </linearGradient>
          <linearGradient id="petalMain" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0" stop-color="#ff4f9a" />
            <stop offset="1" stop-color="#ffa9cd" />
          </linearGradient>
          <radialGradient id="glowGrad" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0" stop-color="#ff8fbd" stop-opacity="0.38" />
            <stop offset="0.6" stop-color="#ff8fbd" stop-opacity="0.14" />
            <stop offset="1" stop-color="#ff8fbd" stop-opacity="0" />
          </radialGradient>
        </defs>

        <!-- soft pink halo behind each bloom -->
        <ellipse class="bloom-glow" cx="128" cy="118" rx="66" ry="58" fill="url(#glowGrad)" />
        <ellipse class="bloom-glow" cx="192" cy="118" rx="66" ry="58" fill="url(#glowGrad)" />

        <g class="tulip tulip-left">
          <path class="stem" pathLength="1" d="M140 330 C136 276 121 214 128 155" />
          <path class="leaf leaf-a" d="M139 302 C112 291 97 262 101 231 C120 253 132 274 141 297 Z" />
          <path class="leaf leaf-b" d="M141 318 C159 310 169 291 167 271 C154 287 146 302 140 315 Z" />
          <g transform="translate(128 155)">
            <g class="bloom">
              <path class="petal petal-back" fill="url(#petalSide)" d="M0 2 C-17 -6 -22 -38 -13 -54 C-7 -63 7 -63 13 -54 C22 -38 17 -6 0 2 Z" />
              <path class="petal petal-l" fill="url(#petalSide)" d="M0 1 C-13 -4 -24 -28 -19 -50 C-16 -60 -7 -57 -5 -46 C-3 -28 -2 -12 0 1 Z" />
              <path class="petal petal-r" fill="url(#petalSide)" d="M0 1 C13 -4 24 -28 19 -50 C16 -60 7 -57 5 -46 C3 -28 2 -12 0 1 Z" />
              <path class="petal petal-front" fill="url(#petalMain)" d="M0 2 C-11 -8 -13 -35 -7 -51 C-3 -59 3 -59 7 -51 C13 -35 11 -8 0 2 Z" />
            </g>
          </g>
        </g>

        <g class="tulip tulip-right">
          <path class="stem" pathLength="1" d="M180 330 C184 276 199 214 192 155" />
          <path class="leaf leaf-b" d="M181 302 C208 291 223 262 219 231 C200 253 188 274 179 297 Z" />
          <path class="leaf leaf-a" d="M179 318 C161 310 151 291 153 271 C166 287 174 302 180 315 Z" />
          <g transform="translate(192 155)">
            <g class="bloom">
              <path class="petal petal-back" fill="url(#petalSide)" d="M0 2 C-17 -6 -22 -38 -13 -54 C-7 -63 7 -63 13 -54 C22 -38 17 -6 0 2 Z" />
              <path class="petal petal-l" fill="url(#petalSide)" d="M0 1 C-13 -4 -24 -28 -19 -50 C-16 -60 -7 -57 -5 -46 C-3 -28 -2 -12 0 1 Z" />
              <path class="petal petal-r" fill="url(#petalSide)" d="M0 1 C13 -4 24 -28 19 -50 C16 -60 7 -57 5 -46 C3 -28 2 -12 0 1 Z" />
              <path class="petal petal-front" fill="url(#petalMain)" d="M0 2 C-11 -8 -13 -35 -7 -51 C-3 -59 3 -59 7 -51 C13 -35 11 -8 0 2 Z" />
            </g>
          </g>
        </g>
      </svg>
    </div>
  </section>

</main>

<!-- graceful fallback if JavaScript is disabled: show the finished scenes -->
<noscript>
  <style>
    .message-line::after { content: attr(data-line); }
    .message-line { opacity: 1 !important; }
    .lantern-message { opacity: 1 !important; transform: translateX(-50%) !important; }
    .boat-art { opacity: 1 !important; transform: none !important; }
    .stem { stroke-dashoffset: 0 !important; }
    .leaf, .bloom { transform: scale(1) !important; }
    .bloom-glow { opacity: 1 !important; }
    .spotlight { opacity: 1 !important; }
    .cue-wrap { display: none; }
    .sunset-sticky { --p: 0; }
  </style>
</noscript>

<script src="./script.js"></script>
</body>
</html>
